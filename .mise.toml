[tools]
rust = "1.93.0"

[tasks.build]
description = "Build release binary"
run = "cargo build --release --locked"

[tasks."build:release"]
description = "Build release binary for a specific target"
run = "cargo build --release --locked --target {{arg(name='target')}}"

[tasks.test]
description = "Run all tests"
run = "cargo test"

[tasks.fmt]
description = "Format code"
run = "cargo fmt"

[tasks."fmt:check"]
description = "Check formatting"
run = "cargo fmt --check"

[tasks.lint]
description = "Lint with clippy"
run = "cargo clippy -- -D warnings"

[tasks.check]
description = "Run all checks (fmt, lint, test)"
depends = ["fmt:check", "lint", "test"]

[tasks.install]
description = "Install locally"
run = "cargo install --path ."
